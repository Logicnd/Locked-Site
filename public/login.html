<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login - Locked Site</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;margin:2rem}</style>
</head>
<body>
  <h1>Locked Site</h1>
  <form method="POST" action="/login">
    <label>Password: <input name="password" type="password" autofocus></label>
    <button type="submit">Enter</button>
  </form>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.has('error')) {
      const p = document.createElement('p');
      p.style.color = 'red';
      p.textContent = 'Incorrect password.';
      document.body.insertBefore(p, document.querySelector('form'));
    }
  </script>
</body>
</html>
