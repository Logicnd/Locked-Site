<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Locked Site</title>
</head>
<body>
  <main>
    <h1>Locked Site</h1>

    <label>
      Password:
      <input id="pw" type="password" autocomplete="current-password" />
    </label>
    <br />
    <label>
      <input id="reveal" type="checkbox" /> Reveal password
    </label>
    <br />
    <button id="hash">Hash password</button>

    <pre id="out" aria-live="polite"></pre>
  </main>

  <script>
    async function sha256Hex(str) {
      const enc = new TextEncoder();
      const data = enc.encode(str);
      const hash = await crypto.subtle.digest('SHA-256', data);
      const bytes = Array.from(new Uint8Array(hash));
      return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('hash').addEventListener('click', async () => {
      const pw = document.getElementById('pw').value || '';
      const h = await sha256Hex(pw);
      document.getElementById('out').textContent = JSON.stringify({ hash: h }, null, 2);
    });

    document.getElementById('reveal').addEventListener('change', (e) => {
      document.getElementById('pw').type = e.target.checked ? 'text' : 'password';
    });
  </script>
</body>
</html>
