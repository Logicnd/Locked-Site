<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Locked Site</title>
</head>
<body>
  <div style="padding:8px;">
    <label style="font-weight:normal;">
      Password:
      <input id="pw" type="password" autocomplete="current-password" />
    </label>
    <button id="eye" aria-label="toggle-reveal" title="Reveal" style="margin-left:6px">👁️</button>
  </div>

  <script>
    // Toggle password visibility via the small eye button
    const pw = document.getElementById('pw');
    const eye = document.getElementById('eye');
    eye.addEventListener('click', () => {
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.textContent = '🙈';
      } else {
        pw.type = 'password';
        eye.textContent = '👁️';
      }
      pw.focus();
    });
  </script>
</body>
</html>
